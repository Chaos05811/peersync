<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeerSync</title>
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("peersync.theme") || "system";
          var isDark =
            theme === "dark" ||
            (theme === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (isDark) {
            document.documentElement.classList.add("dark");
          }
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/client/src/architecture-main.jsx"></script>
  </body>
  </html>
